<svg width="800" height="120" viewBox="0 0 800 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      font-style: italic;
      font-size: 18px; 
      fill: #70E1E8; 
    }
    .author { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      font-weight: bold;
      font-size: 16px; 
      fill: #58A6FF; 
    }

    @media (prefers-color-scheme: light) {
      .quote { fill: #1a7f37; }
      .author { fill: #0969da; }
    }
  </style>

  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" class="quote">
    “There is no secret ingredient. To make something special, you just have to believe it's special”
  </text>
  
  <text x="85%" y="75%" dominant-baseline="middle" text-anchor="end" class="author">
    - Mr. Ping
  </text>
</svg>
