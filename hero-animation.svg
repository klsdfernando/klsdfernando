<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(0, 240, 255, 0)" />
      <stop offset="50%" stop-color="rgba(0, 240, 255, 0.2)" />
      <stop offset="100%" stop-color="rgba(0, 240, 255, 0)" />
    </linearGradient>
  </defs>

  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes rotate-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes rotate-ccw {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }
    @keyframes beam-particle {
      0% { transform: translateY(310px); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(70px); opacity: 0; }
    }
    .floating { animation: float 6s ease-in-out infinite; }
    .rotating-cw { transform-origin: center; animation: rotate-cw 20s linear infinite; }
    .rotating-ccw { transform-origin: center; animation: rotate-ccw 20s linear infinite; }
    .pulsing { animation: pulse 2s ease-in-out infinite; }
    .particle { animation: beam-particle 3s linear infinite; }
  </style>

  <!-- Background Rect for visibility during design -->
  <rect width="100%" height="100%" fill="#0a0b1a" />

  <g class="floating">
    <!-- Central Beam -->
    <rect x="275" y="70" width="50" height="240" fill="url(#beamGrad)" />
    <line x1="300" y1="70" x2="300" y2="310" stroke="#fff" stroke-width="1.5" filter="url(#glow)" opacity="0.6" />

    <!-- Beam Particles -->
    <ellipse cx="300" cy="0" rx="6" ry="3" fill="none" stroke="#00f0ff" stroke-width="1" filter="url(#glow)" class="particle" style="animation-delay: 0s" />
    <ellipse cx="300" cy="0" rx="8" ry="4" fill="none" stroke="#9d00ff" stroke-width="1" filter="url(#glow)" class="particle" style="animation-delay: 1s" />
    <ellipse cx="300" cy="0" rx="6" ry="3" fill="none" stroke="#fff" stroke-width="1" filter="url(#glow)" class="particle" style="animation-delay: 2s" />

    <!-- Stacked Layers (Simplified for SVG) -->
    
    <!-- ML Layer (Purple) -->
    <g transform="translate(300, 70)">
      <g transform="scale(1, 0.5)">
        <circle r="100" fill="none" stroke="#9d00ff" stroke-width="1" stroke-dasharray="4 4" class="rotating-cw" />
        <path d="M 30,0 L 15,45 L -40,64 L -80,20 L -90,-50 L -20,-100 L 80,-70 Z" fill="none" stroke="#9d00ff" stroke-width="1.5" opacity="0.5" class="rotating-ccw" />
      </g>
      <path d="M 100 0 L 140 -20 L 300 -20" fill="none" stroke="#9d00ff" stroke-width="1" opacity="0.6" />
      <text x="145" y="-25" fill="#9d00ff" font-family="monospace" font-size="12" filter="url(#glow)">// MACHINE LEARNING</text>
    </g>

    <!-- Cyber Layer (Green) -->
    <g transform="translate(300, 130)">
      <g transform="scale(1, 0.5)">
        <circle r="100" fill="none" stroke="#00ff88" stroke-width="1.5" stroke-dasharray="60 30" class="rotating-cw" />
        <circle r="80" fill="none" stroke="#00ff88" stroke-width="1" stroke-dasharray="10 5" class="rotating-ccw" />
      </g>
      <path d="M 100 0 L 140 -15 L 300 -15" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.6" />
      <text x="145" y="-20" fill="#00ff88" font-family="monospace" font-size="12" filter="url(#glow)">// CYBERSECURITY</text>
    </g>

    <!-- Net Layer (Cyan) -->
    <g transform="translate(300, 190)">
      <g transform="scale(1, 0.5)">
        <circle r="100" fill="none" stroke="#00f0ff" stroke-width="1.5" />
        <circle r="70" fill="none" stroke="#00f0ff" stroke-width="1" stroke-dasharray="5 5" class="rotating-cw" />
      </g>
      <path d="M 100 0 L 140 -10 L 300 -10" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.6" />
      <text x="145" y="-15" fill="#00f0ff" font-family="monospace" font-size="12" filter="url(#glow)">// NETWORKING</text>
    </g>

    <!-- Elec Layer (Pink) -->
    <g transform="translate(300, 250)">
      <g transform="scale(1, 0.5)">
        <circle r="100" fill="none" stroke="#ff007f" stroke-width="1" stroke-dasharray="2 2" />
        <g class="rotating-cw">
           <path d="M 0 0 L 50 0 L 50 50" fill="none" stroke="#ff007f" stroke-width="2" />
           <path d="M 0 0 L -50 0 L -50 -50" fill="none" stroke="#ff007f" stroke-width="2" />
           <circle cx="50" cy="50" r="4" fill="#ff007f" />
           <circle cx="-50" cy="-50" r="4" fill="#ff007f" />
        </g>
      </g>
      <path d="M 100 0 L 140 -5 L 300 -5" fill="none" stroke="#ff007f" stroke-width="1" opacity="0.6" />
      <text x="145" y="-10" fill="#ff007f" font-family="monospace" font-size="12" filter="url(#glow)">// ELECTRONICS</text>
    </g>

    <!-- Embed Layer (Yellow) -->
    <g transform="translate(300, 310)">
      <g transform="scale(1, 0.5)">
        <circle r="100" fill="none" stroke="#ffb300" stroke-width="2" stroke-dasharray="20 10" class="rotating-ccw" />
        <rect x="-30" y="-30" width="60" height="60" fill="none" stroke="#ffb300" stroke-width="2" class="rotating-cw" />
      </g>
      <path d="M 100 0 L 140 0 L 300 0" fill="none" stroke="#ffb300" stroke-width="1" opacity="0.6" />
      <text x="145" y="-5" fill="#ffb300" font-family="monospace" font-size="12" filter="url(#glow)">// EMBEDDED SYSTEMS</text>
    </g>
  </g>

  <!-- Screen info -->
  <text x="20" y="370" fill="#9aa1d3" font-family="monospace" font-size="10">SYS_SYNC_RATE: <tspan fill="#fff" class="pulsing">99.9%</tspan></text>
  <text x="20" y="385" fill="#9aa1d3" font-family="monospace" font-size="10">UPTIME: <tspan fill="#00f0ff">OPTIMAL</tspan></text>
</svg>
